on: [push, pull_request]
name: Sidecar Check
jobs:
  sidecar-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.x
    - name: Build
      run: cd sidecar && go build ./...
    - name: Vet
      run: cd sidecar && go vet ./...
    - name: Test
      run: cd sidecar && go test ./...
